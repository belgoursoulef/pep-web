version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: carhorizon
    ports:
      - "33066:3306"
    volumes:
      - ./db:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    networks:
      - internal

  web:
    build: ./web
    restart: always
    # The application runs on port 5000 inside the container.
    # With macvlan, it will be accessible at http://192.168.32.115:5000.
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=carhorizon
    depends_on:
      - db
    networks:
      internal:
      exterior:
        ipv4_address: 192.168.32.115

  camera-service:
    build: ./camera-service
    restart: always
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=carhorizon
    depends_on:
      - db
    networks:
      internal:
      exterior:
        ipv4_address: 192.168.32.116

volumes:
  mysql_data:

networks:
  internal:
    driver: bridge
  exterior:
    driver: macvlan
    driver_opts:
      parent: eth0 # Replace with the host's physical network interface name (e.g. eth0, ens18, eno1)
    ipam:
      config:
        - subnet: 192.168.32.112/28
          gateway: 192.168.32.113
